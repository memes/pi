# spell-checker: disable
---
name: release

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - 'v2*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: v2/go.mod
          cache: true
          cache-dependency-path: v2/go.sum
      - name: Setup qemu
        uses: docker/setup-qemu-action@v4.0.0
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0
      - id: docker-login
        name: Login to Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true
      - id: ghcr-login
        name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest@v4.1.0
        with:
          subject-checksums: ./v2/dist/checksums.txt
      - uses: actions/attest@v4.1.0
        with:
          subject-checksums: ./v2/dist/digests.txt
      - name: Trigger Go Report update
        uses: fjogeleit/http-request-action@v2.0.0
        with:
          url: 'https://goreportcard.com/checks'
          method: 'POST'
          contentType: 'application/x-www-form-urlencoded'
          data: 'repo=github.com/${{ github.repository }}/v2'
          preventFailureOnNoResponse: 'true'
